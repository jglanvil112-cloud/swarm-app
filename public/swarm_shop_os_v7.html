<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>House of Jreym — SWARM OS · Command Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#040912;--holo:#3DA5FF;--holo-b:#7FDBFF;--holo-d:#12405f;
  --gold:#F0C040;--green:#33C77A;--red:#E86A4E;
  --ink:#EAF3FF;--muted:#7E97B8;--faint:#43607F;--line:rgba(93,180,255,.2);
  --panel:rgba(10,22,40,.66);--glow:0 0 24px rgba(61,165,255,.4);--glowg:0 0 16px rgba(240,192,64,.4);
  --sans:"Inter",-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;
  --disp:"Space Grotesk",var(--sans);--mono:"JetBrains Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);min-height:100vh;overflow-x:hidden;letter-spacing:.01em;
  background-image:radial-gradient(1000px 620px at 82% -6%,rgba(61,165,255,.14),transparent 60%),radial-gradient(760px 500px at 4% 108%,rgba(240,192,64,.06),transparent 55%),linear-gradient(180deg,#040912,#03060d);}
.wrap{position:relative;z-index:2;max-width:1340px;margin:0 auto;padding:18px 20px 90px}

/* ============ CIRCUIT BACKGROUND (img 1) ============ */
#circuit{position:fixed;inset:0;z-index:0;opacity:.55;pointer-events:none}
#circuit path{fill:none;stroke:rgba(61,165,255,.18);stroke-width:1}
#circuit .flow{stroke:var(--holo-b);stroke-width:1.6;stroke-dasharray:5 190;filter:drop-shadow(0 0 5px var(--holo-b));animation:flow 4s linear infinite}
@keyframes flow{to{stroke-dashoffset:-195}}
#circuit circle{fill:var(--holo);filter:drop-shadow(0 0 6px var(--holo));animation:node 3s ease-in-out infinite}
@keyframes node{0%,100%{opacity:.4}50%{opacity:1}}
body::after{content:"";position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:linear-gradient(rgba(61,165,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(61,165,255,.04) 1px,transparent 1px);
  background-size:46px 46px;mask-image:radial-gradient(circle at 50% 20%,#000,transparent 80%)}

/* ============ COMMAND BAR ============ */
.bar{display:flex;align-items:center;gap:20px;padding:13px 20px;border-radius:18px;background:linear-gradient(120deg,rgba(12,26,46,.9),rgba(8,18,34,.7));border:1px solid var(--line);backdrop-filter:blur(14px);box-shadow:var(--glow)}
.brand{display:flex;align-items:center;gap:12px;min-width:max-content}
.crest svg{width:42px;height:42px;filter:drop-shadow(var(--glowg))}
.brand h1{font-family:var(--disp);font-size:18px;font-weight:700;letter-spacing:.16em;line-height:1}
.brand .sub{font-family:var(--mono);font-size:9px;color:var(--holo-b);letter-spacing:.32em;margin-top:4px}
.kpis{display:flex;gap:24px;margin-left:auto;flex-wrap:wrap}
.kpi .v{font-family:var(--disp);font-size:19px;font-weight:600}.kpi .v.gold{color:var(--gold)}.kpi .v.holo{color:var(--holo-b)}
.kpi .l{font-family:var(--mono);font-size:8.5px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-top:3px}
.clock{font-family:var(--mono);font-size:12px;color:var(--holo-b);letter-spacing:.12em;padding-left:18px;border-left:1px solid var(--line)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);display:inline-block;margin-right:6px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* ============ COMMAND ROOM (img 2) ============ */
.room{margin-top:16px;height:360px;border-radius:22px;position:relative;overflow:hidden;border:1px solid var(--line);
  background:radial-gradient(700px 360px at 50% 118%,rgba(61,165,255,.2),transparent 68%),linear-gradient(180deg,rgba(6,14,28,.35),rgba(4,10,22,.85));
  box-shadow:inset 0 0 100px rgba(61,165,255,.13),var(--glow)}
.room .eyebrow{position:absolute;left:26px;top:20px;z-index:6;font-family:var(--mono);font-size:10px;letter-spacing:.3em;color:var(--gold);text-transform:uppercase}
.room .eyebrow b{color:var(--holo-b);font-weight:500}
.floor{position:absolute;inset:auto 0 0 0;height:190px;transform:perspective(620px) rotateX(60deg);transform-origin:bottom;
  background-image:repeating-linear-gradient(90deg,rgba(61,165,255,.16) 0 1px,transparent 1px 54px),repeating-linear-gradient(0deg,rgba(61,165,255,.12) 0 1px,transparent 1px 44px);
  border-top:1px solid rgba(61,165,255,.35)}
.pods{position:absolute;inset:0}
.pod{position:absolute;bottom:40px;width:34px;height:8px;border-radius:50%;background:radial-gradient(circle,rgba(61,165,255,.5),transparent 70%);animation:podpulse 3s ease-in-out infinite}
@keyframes podpulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
/* agent figures */
.agent-fig{position:absolute;bottom:44px;z-index:5;will-change:transform;transition:transform .05s linear}
.agent-fig svg{display:block;filter:drop-shadow(0 0 8px rgba(61,165,255,.4))}
.agent-fig .ring{position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);width:46px;height:12px;border-radius:50%;border:1px solid rgba(61,165,255,.5);animation:podpulse 2.6s ease-in-out infinite}
.agent-fig .tag{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);white-space:nowrap;font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;color:var(--holo-b);background:rgba(6,14,28,.8);border:1px solid var(--line);border-radius:6px;padding:2px 6px;margin-bottom:4px}
/* action trail (visible ~5s, fades) */
.trail{position:absolute;z-index:4;font-family:var(--mono);font-size:9px;letter-spacing:.04em;color:var(--holo-b);background:rgba(6,14,28,.78);border:1px solid rgba(61,165,255,.35);border-radius:7px;padding:3px 8px;pointer-events:none;box-shadow:0 0 12px rgba(61,165,255,.3);animation:trailfade 5s ease-out forwards}
.trail b{color:var(--gold);font-weight:500}
@keyframes trailfade{0%{opacity:0;transform:translateY(4px) scale(.94)}8%{opacity:1;transform:translateY(0) scale(1)}70%{opacity:.9}100%{opacity:0;transform:translateY(-14px) scale(.98)}}

/* ============ SECTION HEADS ============ */
.sh{display:flex;align-items:center;gap:14px;margin:30px 4px 16px}
.sh h3{font-family:var(--disp);font-size:14px;font-weight:600;letter-spacing:.18em;text-transform:uppercase}
.sh .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
.sh .badge{font-family:var(--mono);font-size:9.5px;color:var(--holo-b);letter-spacing:.12em}
.seg{display:inline-flex;background:rgba(8,18,34,.8);border:1px solid var(--line);border-radius:11px;padding:3px;gap:2px}
.seg button{font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;color:var(--muted);background:none;border:0;padding:7px 12px;border-radius:8px;cursor:pointer;transition:.16s}
.seg button.on{color:#04101f;background:linear-gradient(120deg,var(--holo-b),var(--holo));box-shadow:var(--glow)}
.seg button:hover:not(.on){color:var(--ink)}
select.sub{font-family:var(--mono);font-size:10.5px;color:var(--holo-b);background:rgba(8,18,34,.85);border:1px solid var(--line);border-radius:9px;padding:7px 9px;cursor:pointer}
select.sub:focus{outline:none;border-color:var(--holo)}

/* ============ LAYOUT: dashboard + feed ============ */
.grid2{display:grid;grid-template-columns:1fr 340px;gap:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:17px;backdrop-filter:blur(12px);position:relative;overflow:hidden}
.card::after{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(127,219,255,.6),transparent)}
.card h4{font-family:var(--mono);font-size:10.5px;color:var(--muted);letter-spacing:.16em;text-transform:uppercase}
.chart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:10px;flex-wrap:wrap}
.big{font-family:var(--disp);font-size:28px;font-weight:600;margin:4px 0}.big.gold{color:var(--gold)}
canvas{width:100%;display:block}
/* live product feed */
.feed{max-height:250px;overflow:hidden;position:relative}
.feed-list{display:flex;flex-direction:column;gap:9px}
.fitem{display:flex;align-items:center;gap:11px;padding:9px;border:1px solid var(--line);border-radius:13px;background:rgba(8,18,34,.5);animation:fin .5s ease}
@keyframes fin{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}
.fitem .th{width:38px;height:38px;border-radius:9px;flex-shrink:0;display:grid;place-items:center;background:linear-gradient(135deg,rgba(61,165,255,.25),rgba(240,192,64,.15));border:1px solid var(--line)}
.fitem .th svg{width:20px;height:20px}
.fitem .t{font-family:var(--sans);font-size:12px;font-weight:500;line-height:1.3}
.fitem .m{font-family:var(--mono);font-size:8.5px;color:var(--muted);letter-spacing:.06em;margin-top:2px}
.fitem .pr{margin-left:auto;font-family:var(--disp);font-size:14px;color:var(--gold);font-weight:600}
.pill{font-family:var(--mono);font-size:7.5px;letter-spacing:.1em;padding:2px 6px;border-radius:20px;text-transform:uppercase}
.pill.live{color:var(--green);border:1px solid rgba(51,199,122,.4)}.pill.draft{color:var(--gold);border:1px solid rgba(240,192,64,.4)}

/* ============ AGENT DASHBOARD (img 3, apple) ============ */
.agents{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-top:14px}
@media(max-width:1080px){.agents{grid-template-columns:repeat(2,1fr)}.grid2{grid-template-columns:1fr}}
@media(max-width:600px){.agents{grid-template-columns:1fr}.room{height:280px}}
.ac{background:var(--panel);border:1px solid var(--line);border-radius:17px;padding:15px;transition:.2s;position:relative;overflow:hidden}
.ac:hover{border-color:rgba(61,165,255,.5);box-shadow:var(--glow);transform:translateY(-2px)}
.ac .top{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.ac .mini{width:34px;height:42px;flex-shrink:0}
.ac .nm{font-family:var(--disp);font-size:14px;font-weight:600;letter-spacing:.06em}
.ac .role{font-family:var(--mono);font-size:8.5px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.ac .stt{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:8.5px;color:var(--green);margin-top:5px}
.ac .stt .d{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green)}
.ac .metric{font-family:var(--disp);font-size:18px;font-weight:600;color:var(--holo-b)}
.ac .metric-l{font-family:var(--mono);font-size:8.5px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.ctr{display:flex;gap:6px;margin-top:11px}.ctr select{flex:1;min-width:0}
.run{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:#04101f;background:linear-gradient(120deg,var(--holo-b),var(--holo));border:0;border-radius:9px;padding:9px;cursor:pointer;font-weight:600;text-transform:uppercase;width:100%;margin-top:8px;transition:.15s}
.run:hover{box-shadow:var(--glow);filter:brightness(1.08)}.run:active{transform:scale(.97)}.run.gold{background:linear-gradient(120deg,var(--gold),#d8a020)}
.det{margin-top:10px;padding-top:10px;border-top:1px solid var(--line);font-family:var(--mono);font-size:10px;color:var(--muted);line-height:1.65;min-height:32px}
.det b{color:var(--holo-b);font-weight:500}

.console{margin-top:28px;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:8px;display:flex;gap:8px;backdrop-filter:blur(12px);box-shadow:var(--glow)}
.console input{flex:1;background:transparent;border:0;color:var(--ink);font-family:var(--mono);font-size:13px;padding:14px 16px}
.console input:focus{outline:none}.console input::placeholder{color:var(--faint)}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(30px);z-index:60;background:linear-gradient(120deg,rgba(12,26,46,.96),rgba(8,18,34,.96));border:1px solid var(--holo);border-radius:13px;padding:12px 20px;font-family:var(--mono);font-size:12px;color:var(--holo-b);box-shadow:var(--glow);opacity:0;pointer-events:none;transition:.3s}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(prefers-reduced-motion:reduce){.agent-fig{transition:none!important}*{animation-duration:.01ms!important}}
</style>
</head>
<body>
<svg id="circuit" preserveAspectRatio="none"></svg>
<div class="wrap">

  <header class="bar">
    <div class="brand"><div class="crest"><svg viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="22" stroke="var(--gold)" stroke-width="1.5" opacity=".8"/><path d="M24 8 L30 18 H18 Z M24 40 L18 30 H30 Z M8 24 L18 18 V30 Z M40 24 L30 30 V18 Z" fill="var(--holo-b)" opacity=".9"/><circle cx="24" cy="24" r="5" fill="var(--gold)"/></svg></div>
    <div><h1>HOUSE OF JREYM</h1><div class="sub">SWARM · COMMAND ROOM</div></div></div>
    <div class="kpis">
      <div class="kpi"><div class="v holo" id="k-products">—</div><div class="l">Products</div></div>
      <div class="kpi"><div class="v" id="k-orders">—</div><div class="l">Orders</div></div>
      <div class="kpi"><div class="v gold" id="k-rev">—</div><div class="l">Revenue</div></div>
      <div class="kpi"><div class="v holo" id="k-social">—</div><div class="l">Channels</div></div>
    </div>
    <div class="clock"><span class="dot"></span><span id="clock">—</span></div>
  </header>

  <!-- COMMAND ROOM -->
  <section class="room">
    <div class="eyebrow">Command Room · <b>12 agents working live</b></div>
    <div class="floor"></div>
    <div class="pods" id="pods"></div>
  </section>

  <!-- SALES + LIVE FEED -->
  <div class="sh"><h3>Sales Command</h3><div class="rule"></div>
    <div class="seg" id="range"><button data-r="1h">1 HR</button><button data-r="12h">12 HR</button><button data-r="24h" class="on">24 HR</button><button data-r="wk">WEEKLY</button></div>
  </div>
  <div class="grid2">
    <div class="card">
      <div class="chart-head"><div><h4>Revenue Flow</h4><div class="big gold" id="rev-big">$0.00</div></div>
        <select class="sub" id="csub"><option value="revenue">Revenue</option><option value="orders">Orders</option><option value="views">Store Views</option><option value="designs">Designs Made</option></select></div>
      <canvas id="chart" height="150"></canvas>
    </div>
    <div class="card">
      <div class="chart-head"><h4>Live Product Feed</h4><span class="pill live">● streaming</span></div>
      <div class="feed"><div class="feed-list" id="feed"></div></div>
    </div>
  </div>

  <!-- AGENT DASHBOARD -->
  <div class="sh"><h3>The Swarm</h3><div class="rule"></div><div class="badge">APPLE-STYLE · PER-AGENT RANGES</div></div>
  <section class="agents" id="agents"></section>

  <div class="console"><input id="cmd" placeholder="Hey Swarm — dispatch a task or ask for a report…"><button class="run gold" style="width:auto;margin-top:0;padding:0 22px" onclick="sendCmd()">SEND</button></div>
</div>
<div id="toast"></div>

<script>
const API=location.origin.includes("onrender")?"":"https://swarm-app-3nch.onrender.com";
const AGENTS=[
 {id:"NANA",role:"Trend Scout",tint:"#7FDBFF",metric:"trends",ep:"/api/trending/run",acts:["scouted 3 trends","flagged Juneteenth spike","found 2 hot themes"]},
 {id:"AMARA",role:"Design & Caption",tint:"#F0C040",metric:"designs",ep:"/api/podgen/run",acts:["generated HOJ-X8K2","queued 4 originals","wrote a caption"]},
 {id:"IBRAHIM",role:"Publisher",tint:"#33C77A",metric:"posts",ep:"/api/ibrahim/publish-now",acts:["posted to IG+FB","scheduled 2 posts","cross-posted a reel"]},
 {id:"KWAME",role:"Supply Chain",tint:"#7FDBFF",metric:"skus",acts:["synced inventory","checked 12 SKUs","restocked a line"]},
 {id:"KOFI",role:"Spend Audit",tint:"#F0C040",metric:"saved",acts:["flagged $34 spend","audited ad cost","saved 8% on fees"]},
 {id:"SEUN",role:"Customer Svc",tint:"#E86A4E",metric:"tickets",acts:["answered 2 tickets","drafted a reply","closed a case"]},
 {id:"AISHA",role:"Analytics",tint:"#7FDBFF",metric:"reports",acts:["built weekly report","traced conversions","charted revenue"]},
 {id:"ZARA",role:"Pricing",tint:"#F0C040",metric:"reprice",acts:["repriced 6 items","matched Printify rates","set margins"]},
 {id:"DELE",role:"Fulfilment",tint:"#33C77A",metric:"orders",acts:["routed an order","confirmed shipping","printed a label"]},
 {id:"IMANI",role:"Originals Filing",tint:"#7FDBFF",metric:"filed",ep:"/api/shopify/tag-originals",acts:["filed 2 originals","tagged new POD","sorted a collection"]},
 {id:"FATIMA",role:"SEO Strategy",tint:"#F0C040",metric:"keywords",acts:["optimized 5 titles","added keywords","boosted a listing"]},
 {id:"ABENA",role:"Brand Voice",tint:"#E86A4E",metric:"drafts",acts:["drafted a caption","polished copy","set the tone"]},
];
const RANGES={"1h":{mult:1,label:"1h",pts:12},"12h":{mult:8,label:"12h",pts:12},"24h":{mult:16,label:"24h",pts:16},"wk":{mult:70,label:"7d",pts:14}};
let RANGE="24h";

/* ---- full-body Afrocentric holographic figure ---- */
function figure(tint,scale=1){const s=tint.slice(1);return `<svg width="${44*scale}" height="${96*scale}" viewBox="0 0 44 96" fill="none">
 <defs><linearGradient id="b${s}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${tint}" stop-opacity=".95"/><stop offset="1" stop-color="${tint}" stop-opacity=".18"/></linearGradient></defs>
 <circle cx="22" cy="14" r="9" fill="url(#b${s})" stroke="${tint}" stroke-width="1"/>
 <path d="M13 17 Q22 10 31 17 L31 22 Q22 26 13 22 Z" fill="${tint}" opacity=".35"/>
 <path d="M15 28 Q22 23 29 28 L31 58 Q22 63 13 58 Z" fill="url(#b${s})" stroke="${tint}" stroke-width="1"/>
 <rect x="10" y="40" width="4" height="6" fill="var(--gold)" opacity=".8"/><rect x="30" y="40" width="4" height="6" fill="var(--green)" opacity=".7"/><rect x="18" y="34" width="8" height="3" fill="var(--gold)"/>
 <g class="arm-l"><rect x="10" y="30" width="4" height="24" rx="2" fill="${tint}" opacity=".55"/></g>
 <g class="arm-r"><rect x="30" y="30" width="4" height="24" rx="2" fill="${tint}" opacity=".55"/></g>
 <rect x="16" y="58" width="5" height="34" rx="2.5" fill="${tint}" opacity=".5"/><rect x="23" y="58" width="5" height="34" rx="2.5" fill="${tint}" opacity=".5"/>
</svg>`;}
function mini(tint){return `<svg class="mini" viewBox="0 0 44 96">${figure(tint).replace(/<svg[^>]*>/,'').replace('</svg>','')}</svg>`;}

/* ---- populate command room with moving agents ---- */
const room=document.querySelector(".room"), podsEl=document.getElementById("pods");
const figs=[];
AGENTS.forEach((a,i)=>{
  const lane=i%3;                       // depth lane 0(front)..2(back)
  const scale=[1.05,.85,.68][lane];
  const el=document.createElement("div"); el.className="agent-fig";
  el.style.zIndex=5-lane;
  el.innerHTML=`<div class="ring"></div>${figure(a.tint,scale)}<div class="tag">${a.id}</div>`;
  room.appendChild(el);
  const yBase=[46,86,120][lane];
  const st={el,a,lane,scale,x:8+Math.random()*80,tx:8+Math.random()*80,y:yBase,speed:.06+Math.random()*.05,actI:0,cool:Math.random()*300};
  el.style.bottom=st.y+"px";
  figs.push(st);
});
function place(st){st.el.style.transform=`translateX(${st.x}vw)`;}
figs.forEach(place);

/* animate: patrol + working sway + 5s action trails */
function spawnTrail(st){
  const a=st.a, act=a.acts[st.actI%a.acts.length]; st.actI++;
  const t=document.createElement("div"); t.className="trail";
  t.innerHTML=`<b>${a.id}</b> ${act}`;
  const rect=st.el.getBoundingClientRect(), rr=room.getBoundingClientRect();
  t.style.left=(rect.left-rr.left+10)+"px"; t.style.bottom=(st.y+ (96*st.scale) - 8)+"px";
  room.appendChild(t); setTimeout(()=>t.remove(),5000);
}
let last=performance.now();
function loop(now){
  const dt=Math.min(40,now-last); last=now;
  figs.forEach(st=>{
    const d=st.tx-st.x;
    if(Math.abs(d)<1.2){ st.tx=6+Math.random()*82; if(Math.random()<.7) spawnTrail(st); }
    else st.x+=Math.sign(d)*st.speed*dt;
    place(st);
    st.el.style.filter=`drop-shadow(0 0 8px rgba(61,165,255,.4))`;
  });
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
/* periodic pods */
podsEl.innerHTML=[20,45,70].map(l=>`<div class="pod" style="left:${l}%"></div>`).join("");

/* ---- agent dashboard cards ---- */
const agEl=document.getElementById("agents");
AGENTS.forEach(a=>{
  const el=document.createElement("div"); el.className="ac";
  el.innerHTML=`<div class="top"><div class="mini">${figure(a.tint,.75)}</div>
    <div><div class="nm">${a.id}</div><div class="role">${a.role}</div><div class="stt"><span class="d"></span>ONLINE</div></div></div>
    <div class="metric" data-m>—</div><div class="metric-l">${a.metric} · <span class="rl">24h</span></div>
    <div class="ctr"><select class="sub rng"><option value="1h">1 HR</option><option value="12h">12 HR</option><option value="24h" selected>24 HR</option><option value="wk">WEEKLY</option></select>
    <select class="sub vw"><option value="sales">Sales</option><option value="activity">Activity</option></select></div>

    <div class="det" data-d>Awaiting query…</div>`;
  agEl.appendChild(el);
  const det=el.querySelector("[data-d]"),vw=el.querySelector(".vw"),rng=el.querySelector(".rng"),m=el.querySelector("[data-m]");
  function refresh(){const r=RANGES[rng.value];el.querySelectorAll(".rl").forEach(x=>x.textContent=r.label);
    const b=Math.floor((3+Math.random()*9)*r.mult);m.textContent=b;

  vw.onchange=refresh;rng.onchange=refresh;refresh();
  el.querySelector(".run").onclick=async e=>{const ep=e.target.dataset.ep,id=e.target.dataset.id;
    e.target.textContent="⏳ DISPATCHING";toast(`${id} dispatched${ep?' → '+ep:''}`);
    const st=figs.find(f=>f.a.id===id); if(st)spawnTrail(st);
    if(ep){try{await fetch(API+ep,{method:"POST",headers:{"Content-Type":"application/json","x-approval-key":"hoj_4Qk9mPvX2s677zLpT8nW3eRyU1cBfD6gH0jKaSdF"},body:JSON.stringify({dry:true})});}catch(_){}}
    setTimeout(()=>{e.target.textContent=ep?'▶ RUN':'▶ DISPATCH';refresh();},1400);};
});

/* ---- circuit background ---- */
(function circuit(){const svg=document.getElementById("circuit");const W=window.innerWidth,H=window.innerHeight;svg.setAttribute("viewBox",`0 0 ${W} ${H}`);
  let html="";const cols=8,rows=6;const nx=[],pts=[];
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){const x=(c+.5)*W/cols+(Math.random()-.5)*40,y=(r+.5)*H/rows+(Math.random()-.5)*30;pts.push({x,y});}
  for(let i=0;i<pts.length;i++){const p=pts[i];
    if(i%cols<cols-1){const q=pts[i+1];const mx=(p.x+q.x)/2;html+=`<path d="M${p.x} ${p.y} H${mx} V${q.y} H${q.x}"/>`;if(Math.random()<.5)html+=`<path class="flow" style="animation-delay:${Math.random()*4}s" d="M${p.x} ${p.y} H${mx} V${q.y} H${q.x}"/>`;}
    if(i+cols<pts.length){const q=pts[i+cols];const my=(p.y+q.y)/2;html+=`<path d="M${p.x} ${p.y} V${my} H${q.x} V${q.y}"/>`;if(Math.random()<.4)html+=`<path class="flow" style="animation-delay:${Math.random()*4}s" d="M${p.x} ${p.y} V${my} H${q.x} V${q.y}"/>`;}
    html+=`<circle cx="${p.x}" cy="${p.y}" r="2.5" style="animation-delay:${Math.random()*3}s"/>`;}
  svg.innerHTML=html;
})();
window.addEventListener("resize",()=>{location.reload();},{once:true});

/* ---- chart ---- */
const cv=document.getElementById("chart"),cx=cv.getContext("2d");let cd=[];
function gen(){const r=RANGES[RANGE],n=r.pts,a=[];let v=r.mult*4;for(let i=0;i<n;i++){v=Math.max(0,v+(Math.random()-.45)*r.mult*2);a.push(v);}return a;}
function draw(){const dpr=devicePixelRatio||1,W=cv.clientWidth,H=150;cv.width=W*dpr;cv.height=H*dpr;cx.setTransform(dpr,0,0,dpr,0,0);cx.clearRect(0,0,W,H);
  const d=cd,mx=Math.max(...d,1),pad=6;cx.strokeStyle="rgba(61,165,255,.08)";for(let i=0;i<4;i++){const y=pad+(H-2*pad)*i/3;cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke();}
  const g=cx.createLinearGradient(0,0,0,H);g.addColorStop(0,"rgba(127,219,255,.4)");g.addColorStop(1,"rgba(127,219,255,0)");
  cx.beginPath();d.forEach((v,i)=>{const x=W/(d.length-1)*i,y=H-pad-(H-2*pad)*(v/mx);i?cx.lineTo(x,y):cx.moveTo(x,y);});cx.lineTo(W,H);cx.lineTo(0,H);cx.closePath();cx.fillStyle=g;cx.fill();
  cx.beginPath();d.forEach((v,i)=>{const x=W/(d.length-1)*i,y=H-pad-(H-2*pad)*(v/mx);i?cx.lineTo(x,y):cx.moveTo(x,y);});cx.strokeStyle="#7FDBFF";cx.lineWidth=2.2;cx.shadowColor="#3DA5FF";cx.shadowBlur=12;cx.stroke();cx.shadowBlur=0;
  const ly=H-pad-(H-2*pad)*(d[d.length-1]/mx);cx.beginPath();cx.arc(W-2,ly,3.5,0,7);cx.fillStyle="#F0C040";cx.fill();}
function upChart(){const s=document.getElementById("csub").value;cd=gen();draw();const t=cd.reduce((a,b)=>a+b,0);document.getElementById("rev-big").textContent=s==="revenue"?"$"+(t*3.2).toFixed(2):Math.floor(t).toLocaleString();}
document.getElementById("csub").onchange=upChart;window.addEventListener("resize",draw);
document.querySelectorAll("#range button").forEach(b=>b.onclick=()=>{document.querySelectorAll("#range button").forEach(x=>x.classList.remove("on"));b.classList.add("on");RANGE=b.dataset.r;document.querySelectorAll(".rl").forEach(x=>x.textContent=RANGES[RANGE].label);upChart();});

async function tj(p){try{const r=await fetch(API+p);if(r.ok)return await r.json();}catch(_){}return null;}
async function kpis(){const soc=await tj("/api/social/status");const live=soc&&soc.status?soc.status.filter(s=>s.connected).length:2;

function toast(m){const t=document.getElementById("toast");t.textContent="⟢ "+m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2600);}
function sendCmd(){const i=document.getElementById("cmd");if(!i.value.trim())return;toast('Swarm received: "'+i.value.slice(0,36)+'"');i.value="";}
document.getElementById("cmd").addEventListener("keydown",e=>{if(e.key==="Enter")sendCmd();});
